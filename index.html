<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台周老師學院 - 課綱圖書館</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #FDFDFD;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { 
            background: #E2E8F0; 
            border-radius: 20px; 
            border: 2px solid transparent; 
            background-clip: content-box; 
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #CBD5E1; }

        .macaron-shadow-red { box-shadow: 0 15px 40px -12px rgba(229, 115, 115, 0.25); }
        .macaron-shadow-teal { box-shadow: 0 15px 40px -12px rgba(77, 182, 172, 0.25); }
        .macaron-shadow-blue { box-shadow: 0 15px 40px -12px rgba(100, 181, 246, 0.25); }
        .macaron-shadow-yellow { box-shadow: 0 15px 40px -12px rgba(251, 192, 45, 0.25); }
        .macaron-shadow-purple { box-shadow: 0 15px 40px -12px rgba(186, 104, 200, 0.25); }

        .animate-fade-in { animation: fadeIn 0.6s ease-out forwards; }
        .animate-slide-up { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="text-slate-700">

    <!-- Header - 參照圖片配置 -->
    <header class="bg-white border-b border-slate-50 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-6 py-6 flex items-center justify-between">
            <div class="flex items-center gap-6 sm:gap-8">
                <!-- 大頭貼區域 -->
                <div class="relative cursor-pointer" onclick="goHome()">
                    <div class="w-20 h-20 sm:w-28 sm:h-28 rounded-full bg-gradient-to-tr from-[#E3F2FD] to-[#F3E5F5] p-1.5 shadow-sm hover:scale-105 transition-transform duration-300">
                        <div class="w-full h-full rounded-full bg-white flex items-center justify-center overflow-hidden border-2 border-white">
                            <img src="https://drive.google.com/thumbnail?id=17asuPePehiRAPfyyD5aja4Ng73srhsgz&sz=w400" class="w-full h-full object-cover" alt="台周老師">
                        </div>
                    </div>
                    <div class="absolute -bottom-1 right-0 bg-white px-4 py-1 rounded-full border border-slate-100 shadow-xl">
                        <p class="text-xs font-black text-[#5C6BC0] tracking-tighter">HOST</p>
                    </div>
                </div>
                
                <div class="space-y-3">
                    <h1 class="text-2xl sm:text-5xl font-black text-slate-800 tracking-tight cursor-pointer hover:text-indigo-600 transition-colors" onclick="goHome()">台周老師學院</h1>
                    <div class="flex flex-wrap items-center gap-4">
                        <div class="px-5 py-1.5 bg-[#EEF0FF] text-[#6366F1] rounded-xl text-base font-bold shadow-sm">
                            課綱圖書館
                        </div>
                        <div class="text-slate-400 text-base font-medium">
                            主持人：台周老師
                        </div>
                    </div>
                </div>
            </div>

            <div class="hidden lg:flex items-center gap-4">
                <button onclick="fetchAllSheets()" class="p-3 bg-slate-50 text-slate-300 hover:text-indigo-500 hover:bg-indigo-50 rounded-2xl transition-all">
                    <i data-lucide="refresh-cw" class="w-6 h-6" id="refresh-icon"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content Container -->
    <main class="max-w-7xl mx-auto px-6 pt-12 min-h-[60vh]">
        <!-- Loading State -->
        <div id="loading-state" class="flex flex-col items-center justify-center py-40 gap-4">
            <i data-lucide="loader-2" class="w-12 h-12 text-indigo-200 animate-spin"></i>
            <p class="text-slate-300 font-bold tracking-widest text-xs uppercase">同步課綱資料中...</p>
        </div>

        <!-- Error State -->
        <div id="error-state" class="hidden max-w-2xl mx-auto p-12 bg-white border border-red-50 rounded-[3rem] shadow-xl text-center">
            <i data-lucide="alert-circle" class="w-16 h-16 text-red-500 mx-auto mb-4"></i>
            <h2 class="text-2xl font-bold mb-2">同步發生錯誤</h2>
            <p id="error-message" class="text-slate-500 mb-8 text-base"></p>
            <button onclick="fetchAllSheets()" class="px-10 py-3.5 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg shadow-indigo-100">立即重新整理</button>
        </div>

        <!-- Home View (Module Grid) -->
        <div id="home-view" class="hidden animate-fade-in">
            <div class="flex flex-col items-center text-center space-y-4 mb-20">
                <h2 class="text-4xl sm:text-6xl font-black text-slate-800 tracking-tight">致力讓AI飛入尋常百姓家</h2>
                <p class="text-slate-400 text-lg max-w-xl leading-relaxed">選擇下方學習分頁，查看詳細的教學規劃與器材清單。</p>
            </div>
            <div id="module-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8"></div>
        </div>

        <!-- Detail View (Syllabus Table) -->
        <div id="detail-view" class="hidden animate-slide-up">
            <div id="detail-header" class="mb-12"></div>
            <div id="detail-content" class="bg-white rounded-[4rem] border border-slate-50 shadow-2xl overflow-hidden">
                <div class="overflow-x-auto custom-scrollbar">
                    <table class="w-full text-left border-collapse min-w-[1000px]">
                        <thead id="table-head"></thead>
                        <tbody id="table-body" class="divide-y divide-slate-50"></tbody>
                    </table>
                </div>
            </div>
            <div class="mt-20 flex justify-center pb-20">
                <button onclick="goHome()" id="back-btn-bottom" class="group flex items-center gap-4 px-14 py-6 bg-white border-2 rounded-[3rem] shadow-2xl transition-all active:scale-95">
                    <i data-lucide="arrow-left" class="w-7 h-7"></i>
                    <span class="font-black text-2xl text-slate-800">返回學院模組目錄</span>
                </button>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="mt-24 text-center space-y-8 px-6 pb-20">
        <div class="flex flex-col items-center gap-2">
            <p class="text-2xl font-black text-slate-800 tracking-tight">台周老師學院</p>
            <p class="text-[12px] text-slate-300 font-bold uppercase tracking-[0.7em] mb-4">Tai Zhou Academy Production</p>
            <div class="flex items-center gap-3 px-8 py-2.5 bg-slate-50 rounded-full">
                <span class="w-2.5 h-2.5 bg-green-400 rounded-full animate-pulse shadow-[0_0_10px_rgba(74,222,128,0.5)]"></span>
                <span class="text-[11px] font-black text-slate-400 uppercase tracking-widest">Syllabus System v3.0</span>
            </div>
        </div>
    </footer>

    <script>
        const CONFIG = {
            spreadsheetId: '188znYIIEHLlSf3qFC-Q9ba04hKqMu_XLZe74FBMCUg8',
            sheetNames: ['教學開掛術', '行政神幫手', '大學生必備', '高中生必備']
        };

        const macaronColors = [
            { bg: 'bg-[#FFEBEE]', border: 'border-[#FFCDD2]', text: 'text-[#E57373]', light: 'bg-[#FFCDD2]', tagBg: 'bg-[#FFCDD2]/40', shadow: 'macaron-shadow-red', deep: 'text-[#C62828]' }, 
            { bg: 'bg-[#E0F2F1]', border: 'border-[#B2DFDB]', text: 'text-[#4DB6AC]', light: 'bg-[#B2DFDB]', tagBg: 'bg-[#B2DFDB]/40', shadow: 'macaron-shadow-teal', deep: 'text-[#00796B]' }, 
            { bg: 'bg-[#E3F2FD]', border: 'border-[#BBDEFB]', text: 'text-[#64B5F6]', light: 'bg-[#BBDEFB]', tagBg: 'bg-[#BBDEFB]/40', shadow: 'macaron-shadow-blue', deep: 'text-[#1976D2]' }, 
            { bg: 'bg-[#FFFDE7]', border: 'border-[#FFF9C4]', text: 'text-[#FBC02D]', light: 'bg-[#FFF9C4]', tagBg: 'bg-[#FFF9C4]/40', shadow: 'macaron-shadow-yellow', deep: 'text-[#F57F17]' }, 
            { bg: 'bg-[#F3E5F5]', border: 'border-[#E1BEE7]', text: 'text-[#BA68C8]', light: 'bg-[#E1BEE7]', tagBg: 'bg-[#E1BEE7]/40', shadow: 'macaron-shadow-purple', deep: 'text-[#7B1FA2]' }, 
        ];

        let modules = [];

        function parseCSV(text) {
            const result = [];
            let row = [];
            let field = '';
            let inQuotes = false;
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const nextChar = text[i+1];
                if (inQuotes) {
                    if (char === '"' && nextChar === '"') { field += '"'; i++; }
                    else if (char === '"') inQuotes = false;
                    else field += char;
                } else {
                    if (char === '"') inQuotes = true;
                    else if (char === ',') { row.push(field); field = ''; }
                    else if (char === '\r' || char === '\n') {
                        row.push(field);
                        if (row.length > 0 && (row.length > 1 || row[0] !== '')) result.push(row);
                        row = []; field = '';
                        if (char === '\r' && nextChar === '\n') i++;
                    } else field += char;
                }
            }
            if (row.length > 0 || field !== '') { row.push(field); result.push(row); }
            return result;
        }

        async function fetchAllSheets() {
            const loading = document.getElementById('loading-state');
            const errorDiv = document.getElementById('error-state');
            const homeView = document.getElementById('home-view');
            const detailView = document.getElementById('detail-view');
            
            loading.classList.remove('hidden');
            homeView.classList.add('hidden');
            detailView.classList.add('hidden');
            errorDiv.classList.add('hidden');

            try {
                const allModulesData = [];
                for (let i = 0; i < CONFIG.sheetNames.length; i++) {
                    const name = CONFIG.sheetNames[i];
                    const url = `https://docs.google.com/spreadsheets/d/${CONFIG.spreadsheetId}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(name)}`;
                    
                    try {
                        const response = await fetch(url);
                        if (!response.ok) continue;
                        const csvText = await response.text();
                        const rows = parseCSV(csvText);
                        
                        if (rows.length > 0) {
                            const headers = rows[0].map(h => String(h).trim());
                            const data = rows.slice(1).map((row, rIdx) => {
                                const obj = {};
                                headers.forEach((header, cIdx) => {
                                    obj[header] = row[cIdx] || '';
                                });
                                return obj;
                            });

                            allModulesData.push({
                                id: i,
                                title: name,
                                courses: data,
                                colorIndex: i % macaronColors.length
                            });
                        }
                    } catch (e) { console.warn(e); }
                }

                if (allModulesData.length === 0) throw new Error('雲端同步失敗，請確認試算表已發布。');
                
                modules = allModulesData;
                renderModules();
                loading.classList.add('hidden');
                homeView.classList.remove('hidden');
                lucide.createIcons();
            } catch (err) {
                document.getElementById('error-message').innerText = err.message;
                loading.classList.add('hidden');
                errorDiv.classList.remove('hidden');
            }
        }

        function renderModules() {
            const grid = document.getElementById('module-grid');
            grid.innerHTML = modules.map(module => {
                const color = macaronColors[module.colorIndex];
                return `
                    <button onclick="showDetail(${module.id})" class="group relative p-8 ${color.bg} border-b-[6px] ${color.border} rounded-[3rem] flex flex-col min-h-[240px] transition-all duration-500 hover:shadow-2xl hover:-translate-y-3 text-left outline-none ${color.shadow}">
                        <div class="flex justify-between items-start mb-8">
                            <div class="w-16 h-16 ${color.light} rounded-[1.25rem] flex items-center justify-center shadow-inner group-hover:rotate-6 transition-transform">
                                <i data-lucide="graduation-cap" class="w-8 h-8 ${color.text}"></i>
                            </div>
                            <div class="px-4 py-1.5 ${color.tagBg} ${color.text} rounded-full text-[11px] font-black tracking-widest">館藏</div>
                        </div>
                        <h3 class="font-black text-slate-800 text-2xl leading-tight mb-4 flex-grow">${module.title}</h3>
                        <div class="mt-4 pt-5 border-t border-white/50 flex items-center justify-between text-[11px] font-black text-slate-400 uppercase group-hover:text-indigo-600 transition-colors">
                            <span class="flex items-center gap-2"><i data-lucide="layers" class="w-4 h-4"></i> ${module.courses.length} 個單元</span>
                            <div class="flex items-center gap-1.5 font-black">開啟課綱 <i data-lucide="arrow-right" class="w-4 h-4"></i></div>
                        </div>
                    </button>
                `;
            }).join('');
            lucide.createIcons();
        }

        function showDetail(id) {
            const module = modules.find(m => m.id === id);
            const theme = macaronColors[module.colorIndex];
            
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('detail-view').classList.remove('hidden');
            window.scrollTo(0, 0);

            // Render Header (沉浸式配色)
            document.getElementById('detail-header').innerHTML = `
                <div class="mb-12 animate-fade-in">
                    <button onclick="goHome()" class="flex items-center gap-3 text-slate-400 font-bold text-base mb-8 hover:text-slate-600 transition-all group">
                        <div class="p-3 rounded-full ${theme.bg} group-hover:scale-110 transition-transform">
                            <i data-lucide="arrow-left" class="w-5 h-5 ${theme.text}"></i>
                        </div>
                        返回目錄
                    </button>
                    <div class="flex flex-col md:flex-row md:items-end justify-between gap-10">
                        <div class="space-y-6">
                            <div class="flex items-center gap-6">
                                <div class="w-20 h-20 ${theme.bg} rounded-[2rem] flex items-center justify-center shadow-xl ${theme.shadow} border border-white">
                                    <i data-lucide="book-open" class="w-10 h-10 ${theme.text}"></i>
                                </div>
                                <h2 class="text-4xl sm:text-7xl font-black text-slate-800 tracking-tight leading-none">${module.title}</h2>
                            </div>
                            <p class="text-slate-400 font-medium text-xl max-w-2xl">收錄「${module.title}」精華課綱，快速掌握 AI 核心應用。</p>
                        </div>
                        <div class="p-8 ${theme.bg} rounded-[2.5rem] border-2 border-white shadow-2xl ${theme.shadow} flex items-center gap-10">
                            <div class="text-center px-6">
                                <p class="text-[11px] font-black ${theme.text} uppercase tracking-widest mb-2">單元總數</p>
                                <p class="text-4xl font-black text-slate-800">${module.courses.length}</p>
                            </div>
                            <div class="w-px h-16 bg-white/60"></div>
                            <div class="w-16 h-16 rounded-3xl ${theme.light} flex items-center justify-center shadow-sm">
                                <i data-lucide="sparkles" class="w-8 h-8 ${theme.text}"></i>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            // Render Table (完全移除英文)
            document.getElementById('table-head').innerHTML = `
                <tr class="${theme.bg} border-b ${theme.border}">
                    <th class="px-10 py-10 text-[12px] font-black uppercase tracking-widest opacity-60">序號</th>
                    <th class="px-10 py-10 text-[12px] font-black uppercase tracking-widest opacity-60">主題</th>
                    <th class="px-10 py-10 text-[12px] font-black uppercase tracking-widest opacity-60">大綱</th>
                    <th class="px-10 py-10 text-[12px] font-black uppercase tracking-widest opacity-60">時間</th>
                    <th class="px-10 py-10 text-[12px] font-black uppercase tracking-widest opacity-60">所需器材</th>
                </tr>
            `;

            document.getElementById('table-body').innerHTML = module.courses.map((course, idx) => `
                <tr class="group hover:bg-slate-50/40 transition-all">
                    <td class="px-10 py-12 align-top">
                        <span class="w-12 h-12 rounded-2xl ${theme.light} ${theme.text} flex items-center justify-center font-black text-base group-hover:scale-110 transition-all shadow-sm">
                            ${String(idx + 1).padStart(2, '0')}
                        </span>
                    </td>
                    <td class="px-10 py-12 align-top min-w-[220px]">
                        <h4 class="font-black text-2xl leading-tight ${theme.deep} group-hover:translate-x-1 transition-transform">${course.主題 || '-'}</h4>
                        <div class="mt-4 inline-flex items-center gap-2 px-3 py-1 rounded-lg ${theme.tagBg} ${theme.text} text-[11px] font-black uppercase tracking-wider">教學單元</div>
                    </td>
                    <td class="px-10 py-12 align-top max-w-lg text-slate-600 text-lg leading-relaxed font-medium">
                        ${course.大綱 || '講師暫無描述'}
                    </td>
                    <td class="px-10 py-12 align-top">
                        <div class="flex items-center gap-3 px-5 py-2.5 ${theme.bg} ${theme.text} rounded-2xl w-fit font-black text-base shadow-sm">
                            <i data-lucide="clock" class="w-5 h-5"></i>
                            <span>${course.時間 || '彈性'}</span>
                        </div>
                    </td>
                    <td class="px-10 py-12 align-top">
                        <div class="flex flex-wrap gap-2.5">
                            ${(course.器材 || '').split('\n').filter(Boolean).map(item => `
                                <span class="px-5 py-2 ${theme.tagBg} ${theme.text} text-[12px] font-black rounded-xl border-2 border-white shadow-sm">${item}</span>
                            `).join('') || '<span class="text-slate-300 text-sm italic font-medium">無</span>'}
                        </div>
                    </td>
                </tr>
            `).join('');

            // 下方返回按鈕同步 (修正 null 引用錯誤)
            const backBtn = document.getElementById('back-btn-bottom');
            if (backBtn) {
                backBtn.className = `group flex items-center gap-5 px-16 py-6 bg-white border-4 ${theme.border} rounded-[3rem] shadow-2xl ${theme.shadow} hover:scale-105 transition-all active:scale-95`;
                // 針對 Lucide 渲染後的 svg 進行處理
                const icon = backBtn.querySelector('i, svg');
                if (icon) {
                    icon.setAttribute('class', `w-8 h-8 ${theme.text} group-hover:-translate-x-1 transition-transform`);
                }
            }

            lucide.createIcons();
        }

        function goHome() {
            document.getElementById('detail-view').classList.add('hidden');
            document.getElementById('home-view').classList.remove('hidden');
            window.scrollTo(0, 0);
        }

        window.onload = fetchAllSheets;
    </script>
</body>
</html>
