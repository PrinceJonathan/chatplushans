<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台周老師學院 - 課綱圖書館</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #FDFDFD;
        }

        /* 強制表格內容置左 */
        table, th, td {
            text-align: left !important;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { 
            background: #E2E8F0; 
            border-radius: 20px; 
            border: 2px solid transparent; 
            background-clip: content-box; 
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #CBD5E1; }

        .macaron-shadow-red { box-shadow: 0 10px 30px -10px rgba(229, 115, 115, 0.2); }
        .macaron-shadow-teal { box-shadow: 0 10px 30px -10px rgba(77, 182, 172, 0.2); }
        .macaron-shadow-blue { box-shadow: 0 10px 30px -10px rgba(100, 181, 246, 0.2); }
        .macaron-shadow-yellow { box-shadow: 0 10px 30px -10px rgba(251, 192, 45, 0.2); }
        .macaron-shadow-purple { box-shadow: 0 10px 30px -10px rgba(186, 104, 200, 0.2); }

        .animate-fade-in { animation: fadeIn 0.6s ease-out forwards; }
        .animate-slide-up { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="text-slate-700">

    <!-- Header -->
    <header class="bg-white border-b border-slate-50 sticky top-0 z-40">
        <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-5 sm:gap-6">
                <div class="relative cursor-pointer" onclick="goHome()">
                    <div class="w-16 h-16 sm:w-20 sm:h-20 rounded-full bg-gradient-to-tr from-[#E3F2FD] to-[#F3E5F5] p-1 shadow-sm hover:scale-105 transition-transform duration-300">
                        <div class="w-full h-full rounded-full bg-white flex items-center justify-center overflow-hidden border-2 border-white">
                            <img src="https://drive.google.com/thumbnail?id=17asuPePehiRAPfyyD5aja4Ng73srhsgz&sz=w400" class="w-full h-full object-cover" alt="台周老師">
                        </div>
                    </div>
                    <div class="absolute -bottom-1 right-0 bg-white px-3 py-0.5 rounded-full border border-slate-100 shadow-lg">
                        <p class="text-[10px] font-black text-[#5C6BC0] tracking-tighter">HOST</p>
                    </div>
                </div>
                
                <div class="space-y-1.5 text-left">
                    <h1 class="text-xl sm:text-3xl font-black text-slate-800 tracking-tight cursor-pointer hover:text-indigo-600 transition-colors" onclick="goHome()">台周老師學院</h1>
                    <div class="flex flex-wrap items-center gap-3">
                        <div class="px-3 py-1 bg-[#EEF0FF] text-[#6366F1] rounded-lg text-xs font-bold shadow-sm">
                            課綱圖書館
                        </div>
                        <div class="text-slate-400 text-xs font-medium">
                            主持人：台周老師
                        </div>
                    </div>
                </div>
            </div>

            <div class="hidden lg:flex items-center gap-4">
                <button onclick="fetchAllSheets()" class="p-2.5 bg-slate-50 text-slate-300 hover:text-indigo-500 hover:bg-indigo-50 rounded-xl transition-all">
                    <i data-lucide="refresh-cw" class="w-5 h-5" id="refresh-icon"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 pt-10 min-h-[60vh]">
        <div id="loading-state" class="flex flex-col items-center justify-center py-32 gap-4">
            <i data-lucide="loader-2" class="w-10 h-10 text-indigo-200 animate-spin"></i>
            <p class="text-slate-300 font-bold tracking-widest text-[10px] uppercase">同步課綱資料中...</p>
        </div>

        <div id="error-state" class="hidden max-w-xl mx-auto p-10 bg-white border border-red-50 rounded-[2.5rem] shadow-xl text-center">
            <i data-lucide="alert-circle" class="w-12 h-12 text-red-500 mx-auto mb-3"></i>
            <h2 class="text-xl font-bold mb-2">同步發生錯誤</h2>
            <p id="error-message" class="text-slate-500 mb-6 text-sm"></p>
            <button onclick="fetchAllSheets()" class="px-8 py-3 bg-indigo-600 text-white rounded-xl font-bold shadow-lg shadow-indigo-100 text-sm">立即重新整理</button>
        </div>

        <div id="home-view" class="hidden animate-fade-in">
            <div class="flex flex-col items-center text-center space-y-3 mb-16">
                <h2 class="text-3xl sm:text-4xl font-black text-slate-800 tracking-tight text-center">致力讓AI飛入尋常百姓家</h2>
                <p class="text-slate-400 text-sm max-w-lg leading-relaxed text-center">選擇下方學習分頁，查看詳細的教學規劃與器材清單。</p>
            </div>
            <div id="module-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
        </div>

        <div id="detail-view" class="hidden animate-slide-up">
            <div id="detail-header" class="mb-10 text-left"></div>
            <div id="detail-content" class="bg-white rounded-[3rem] border border-slate-50 shadow-xl overflow-hidden">
                <div class="overflow-x-auto custom-scrollbar">
                    <table class="w-full text-left border-collapse min-w-[900px] table-auto">
                        <thead id="table-head"></thead>
                        <tbody id="table-body" class="divide-y divide-slate-50"></tbody>
                    </table>
                </div>
            </div>
            <div class="mt-16 flex justify-center pb-20">
                <button onclick="goHome()" id="back-btn-bottom" class="group flex items-center gap-3 px-10 py-4 bg-white border-2 rounded-[2rem] shadow-xl transition-all active:scale-95">
                    <i data-lucide="arrow-left" class="w-5 h-5"></i>
                    <span class="font-black text-xl text-slate-800">返回目錄</span>
                </button>
            </div>
        </div>
    </main>

    <footer class="mt-16 text-center space-y-6 px-6 pb-16">
        <div class="flex flex-col items-center gap-1">
            <p class="text-lg font-black text-slate-800 tracking-tight">台周老師學院</p>
            <p class="text-[10px] text-slate-300 font-bold uppercase tracking-[0.6em] mb-3">Tai Zhou Academy Production</p>
            <div class="flex items-center gap-2.5 px-6 py-1.5 bg-slate-50 rounded-full">
                <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse shadow-[0_0_8px_rgba(74,222,128,0.5)]"></span>
                <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Syllabus System v3.5</span>
            </div>
        </div>
    </footer>

    <script>
        const CONFIG = {
            spreadsheetId: '188znYIIEHLlSf3qFC-Q9ba04hKqMu_XLZe74FBMCUg8',
            sheetNames: ['教學開掛術', '行政神幫手', '大學生必備', '高中生必備']
        };

        const macaronColors = [
            { bg: 'bg-[#FFEBEE]', border: 'border-[#FFCDD2]', text: 'text-[#E57373]', light: 'bg-[#FFCDD2]', tagBg: 'bg-[#FFCDD2]/30', shadow: 'macaron-shadow-red', deep: 'text-[#C62828]' }, 
            { bg: 'bg-[#E0F2F1]', border: 'border-[#B2DFDB]', text: 'text-[#4DB6AC]', light: 'bg-[#B2DFDB]', tagBg: 'bg-[#B2DFDB]/30', shadow: 'macaron-shadow-teal', deep: 'text-[#00796B]' }, 
            { bg: 'bg-[#E3F2FD]', border: 'border-[#BBDEFB]', text: 'text-[#64B5F6]', light: 'bg-[#BBDEFB]', tagBg: 'bg-[#BBDEFB]/30', shadow: 'macaron-shadow-blue', deep: 'text-[#1976D2]' }, 
            { bg: 'bg-[#FFFDE7]', border: 'border-[#FFF9C4]', text: 'text-[#FBC02D]', light: 'bg-[#FFF9C4]', tagBg: 'bg-[#FFF9C4]/30', shadow: 'macaron-shadow-yellow', deep: 'text-[#F57F17]' }, 
            { bg: 'bg-[#F3E5F5]', border: 'border-[#E1BEE7]', text: 'text-[#BA68C8]', light: 'bg-[#E1BEE7]', tagBg: 'bg-[#E1BEE7]/30', shadow: 'macaron-shadow-purple', deep: 'text-[#7B1FA2]' }, 
        ];

        let modules = [];

        function parseCSV(text) {
            const result = [];
            let row = [];
            let field = '';
            let inQuotes = false;
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const nextChar = text[i+1];
                if (inQuotes) {
                    if (char === '"' && nextChar === '"') { field += '"'; i++; }
                    else if (char === '"') inQuotes = false;
                    else field += char;
                } else {
                    if (char === '"') inQuotes = true;
                    else if (char === ',') { row.push(field); field = ''; }
                    else if (char === '\r' || char === '\n') {
                        row.push(field);
                        if (row.length > 0 && (row.length > 1 || row[0] !== '')) result.push(row);
                        row = []; field = '';
                        if (char === '\r' && nextChar === '\n') i++;
                    } else field += char;
                }
            }
            if (row.length > 0 || field !== '') { row.push(field); result.push(row); }
            return result;
        }

        async function fetchAllSheets() {
            const loading = document.getElementById('loading-state');
            const errorDiv = document.getElementById('error-state');
            const homeView = document.getElementById('home-view');
            const detailView = document.getElementById('detail-view');
            
            loading.classList.remove('hidden');
            homeView.classList.add('hidden');
            detailView.classList.add('hidden');
            errorDiv.classList.add('hidden');

            try {
                const allModulesData = [];
                for (let i = 0; i < CONFIG.sheetNames.length; i++) {
                    const name = CONFIG.sheetNames[i];
                    const url = `https://docs.google.com/spreadsheets/d/${CONFIG.spreadsheetId}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(name)}`;
                    
                    try {
                        const response = await fetch(url);
                        if (!response.ok) continue;
                        const csvText = await response.text();
                        const rows = parseCSV(csvText);
                        
                        if (rows.length > 0) {
                            const headers = rows[0].map(h => String(h).trim());
                            const data = rows.slice(1).map((row, rIdx) => {
                                const obj = {};
                                headers.forEach((header, cIdx) => {
                                    obj[header] = row[cIdx] || '';
                                });
                                return obj;
                            });

                            allModulesData.push({
                                id: i,
                                title: name,
                                courses: data,
                                colorIndex: i % macaronColors.length
                            });
                        }
                    } catch (e) { console.warn(e); }
                }

                if (allModulesData.length === 0) throw new Error('雲端同步失敗，請確認試算表已發布。');
                
                modules = allModulesData;
                renderModules();
                loading.classList.add('hidden');
                homeView.classList.remove('hidden');
                lucide.createIcons();
            } catch (err) {
                document.getElementById('error-message').innerText = err.message;
                loading.classList.add('hidden');
                errorDiv.classList.remove('hidden');
            }
        }

        function renderModules() {
            const grid = document.getElementById('module-grid');
            grid.innerHTML = modules.map(module => {
                const color = macaronColors[module.colorIndex];
                return `
                    <button onclick="showDetail(${module.id})" class="group relative p-6 ${color.bg} border-b-[4px] ${color.border} rounded-[2rem] flex flex-col min-h-[210px] transition-all duration-500 hover:shadow-xl hover:-translate-y-2 text-left outline-none ${color.shadow}">
                        <div class="flex justify-between items-start mb-6 text-left">
                            <div class="w-12 h-12 ${color.light} rounded-xl flex items-center justify-center shadow-inner group-hover:rotate-6 transition-transform">
                                <i data-lucide="graduation-cap" class="w-6 h-6 ${color.text}"></i>
                            </div>
                            <div class="px-3 py-1 ${color.tagBg} ${color.text} rounded-full text-[9px] font-black tracking-widest">館藏</div>
                        </div>
                        <h3 class="font-black text-slate-800 text-xl leading-tight mb-3 flex-grow text-left">${module.title}</h3>
                        <div class="mt-4 pt-4 border-t border-white/50 flex items-center justify-between text-[10px] font-black text-slate-400 uppercase group-hover:text-indigo-600 transition-colors">
                            <span class="flex items-center gap-1.5 font-bold"><i data-lucide="layers" class="w-3.5 h-3.5"></i> ${module.courses.length} 單元</span>
                            <div class="flex items-center gap-1 text-left">開啟 <i data-lucide="arrow-right" class="w-3.5 h-3.5"></i></div>
                        </div>
                    </button>
                `;
            }).join('');
            lucide.createIcons();
        }

        function showDetail(id) {
            const module = modules.find(m => m.id === id);
            const theme = macaronColors[module.colorIndex];
            
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('detail-view').classList.remove('hidden');
            window.scrollTo(0, 0);

            document.getElementById('detail-header').innerHTML = `
                <div class="mb-8 animate-fade-in text-left">
                    <button onclick="goHome()" class="flex items-center gap-2 text-slate-400 font-bold text-xs mb-6 hover:text-slate-600 transition-all group">
                        <div class="p-2.5 rounded-full ${theme.bg} group-hover:scale-110 transition-transform">
                            <i data-lucide="arrow-left" class="w-4 h-4 ${theme.text}"></i>
                        </div>
                        返回目錄
                    </button>
                    <div class="flex flex-col md:flex-row md:items-end justify-between gap-8 text-left">
                        <div class="space-y-4 text-left">
                            <div class="flex items-center gap-5 justify-start">
                                <div class="w-14 h-14 ${theme.bg} rounded-2xl flex items-center justify-center shadow-lg ${theme.shadow} border border-white">
                                    <i data-lucide="book-open" class="w-7 h-7 ${theme.text}"></i>
                                </div>
                                <h2 class="text-3xl sm:text-5xl font-black text-slate-800 tracking-tight leading-none text-left">${module.title}</h2>
                            </div>
                            <p class="text-slate-400 font-medium text-base max-w-xl text-left">收錄「${module.title}」精華課綱，快速掌握 AI 核心應用。</p>
                        </div>
                        <div class="p-6 ${theme.bg} rounded-[2rem] border-2 border-white shadow-xl ${theme.shadow} flex items-center gap-8">
                            <div class="text-center px-4">
                                <p class="text-[9px] font-black ${theme.text} uppercase tracking-widest mb-1 text-center">單元總數</p>
                                <p class="text-3xl font-black text-slate-800 text-center">${module.courses.length}</p>
                            </div>
                            <div class="w-px h-12 bg-white/60"></div>
                            <div class="w-12 h-12 rounded-2xl ${theme.light} flex items-center justify-center shadow-sm">
                                <i data-lucide="sparkles" class="w-5 h-5 ${theme.text}"></i>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('table-head').innerHTML = `
                <tr class="${theme.bg} border-b ${theme.border}">
                    <th class="px-6 py-6 text-[10px] font-black uppercase tracking-widest opacity-60 text-left w-[80px]">序號</th>
                    <th class="px-6 py-6 text-[10px] font-black uppercase tracking-widest opacity-60 text-left w-[220px]">主題</th>
                    <th class="px-6 py-6 text-[10px] font-black uppercase tracking-widest opacity-60 text-left">大綱</th>
                    <th class="px-6 py-6 text-[10px] font-black uppercase tracking-widest opacity-60 text-left w-[120px]">時間</th>
                    <th class="px-6 py-6 text-[10px] font-black uppercase tracking-widest opacity-60 text-left w-[180px]">所需器材</th>
                </tr>
            `;

            // 修正重點：把 course.大綱 前後的 HTML 縮排與換行拿掉，讓 whitespace-pre-wrap 只對真實資料生效
            document.getElementById('table-body').innerHTML = module.courses.map((course, idx) => `
                <tr class="group hover:bg-slate-50/40 transition-all">
                    <td class="px-6 py-8 align-top text-left">
                        <div class="w-9 h-9 rounded-xl ${theme.light} ${theme.text} flex items-center justify-center font-black text-xs group-hover:scale-110 transition-all shadow-sm">
                            ${String(idx + 1).padStart(2, '0')}
                        </div>
                    </td>
                    <td class="px-6 py-8 align-top text-left">
                        <h4 class="font-black text-lg leading-tight ${theme.deep} group-hover:translate-x-1 transition-transform text-left">${course.主題 || '-'}</h4>
                        <div class="mt-3 inline-flex items-center gap-1.5 px-2 py-0.5 rounded-lg ${theme.tagBg} ${theme.text} text-[9px] font-black uppercase tracking-wider">教學單元</div>
                    </td>
                    <td class="px-6 py-8 align-top text-left">
                        <div class="text-slate-600 text-sm leading-relaxed font-medium whitespace-pre-wrap text-left block w-full">${course.大綱 || '講師暫無描述'}</div>
                    </td>
                    <td class="px-6 py-8 align-top text-left">
                        <div class="flex items-center gap-2 px-3 py-1.5 ${theme.bg} ${theme.text} rounded-xl w-fit font-black text-xs shadow-sm">
                            <i data-lucide="clock" class="w-3.5 h-3.5"></i>
                            <span>${course.時間 || '彈性'}</span>
                        </div>
                    </td>
                    <td class="px-6 py-8 align-top text-left">
                        <div class="flex flex-wrap gap-2 justify-start text-left">
                            ${(course.器材 || '').split('\n').filter(Boolean).map(item => `
                                <span class="px-3 py-1 ${theme.tagBg} ${theme.text} text-[10px] font-black rounded-lg border-2 border-white shadow-sm">${item}</span>
                            `).join('') || '<span class="text-slate-300 text-xs italic font-medium">無</span>'}
                        </div>
                    </td>
                </tr>
            `).join('');

            const backBtn = document.getElementById('back-btn-bottom');
            if (backBtn) {
                backBtn.className = `group flex items-center gap-3 px-10 py-4 bg-white border-4 ${theme.border} rounded-[2rem] shadow-xl ${theme.shadow} hover:scale-105 transition-all active:scale-95`;
                const icon = backBtn.querySelector('i, svg');
                if (icon) {
                    icon.setAttribute('class', `w-5 h-5 ${theme.text} group-hover:-translate-x-1 transition-transform`);
                }
            }

            lucide.createIcons();
        }

        function goHome() {
            document.getElementById('detail-view').classList.add('hidden');
            document.getElementById('home-view').classList.remove('hidden');
            window.scrollTo(0, 0);
        }

        window.onload = fetchAllSheets;
    </script>
</body>
</html>
